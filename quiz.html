<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IntelliQuiz - Quiz Page</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Intelli.png">

</head>

<body>

    <div class="quiz-container">

        <div class="quiz-header">

            <h1>IntelliQuiz</h1>

            <div class="quiz-info">

                <p>Question 1 of 20</p>
                <p>Time Left: 04:59</p>

            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

        </div>

        <div class="question-box">

            <h2>
                What does DBMS stand for?
            </h2>

            <div class="options">

                <button class="option-btn">
                    Data Backup Management System
                </button>

                <button class="option-btn">
                    Database Management System
                </button>

                <button class="option-btn">
                    Digital Base Mapping System
                </button>

                <button class="option-btn">
                    Database Modelling Service
                </button>

            </div>

        </div>

        <div class="quiz-footer">

            <div class="score-area">
                Current Score: 2
            </div>

            <div class="quiz-buttons">

                <button class="btn-secondary">
                    Previous
                </button>

                <button class="btn-primary">
                    Next Question
                </button>

            </div>

        </div>

    </div>
 <footer class="footer">
        <p>© 2026 IntelliQuiz | Designed for Interactive Learning</p>
    </footer>
    <script>
      const API_BASE = "https://intelliquiz-backend-uyp8.onrender.com";

// ===== State =====
let questions = [];
let currentIndex = 0;
let selectedAnswers = {};
let timer = null;
let timeLeft = 300;

const quizId = localStorage.getItem("selectedQuizId");
const quizTitle = localStorage.getItem("selectedQuizTitle");

// ===== Load Quiz =====
async function loadQuestions() {

    if (!quizId) {
        alert("No quiz selected.");
        window.location.href = "index.html";
        return;
    }

    try {

        const response = await fetch(`${API_BASE}/api/quizzes/${quizId}/questions`);
        const result = await response.json();

        if (!result.success || !result.data || result.data.length === 0) {
            alert("No questions found for this quiz.");
            return;
        }

        questions = result.data;

        document.querySelector(".quiz-header h1").textContent =
            quizTitle || "IntelliQuiz";

        renderQuestion();
        startTimer();

    } catch (err) {

        console.error(err);
        alert("Failed to load questions.");

    }
}

// ===== Display Question =====
function renderQuestion() {

    const question = questions[currentIndex];

    document.querySelector(".question-box h2").textContent =
        question.question;

    const options = [
        question.option_a,
        question.option_b,
        question.option_c,
        question.option_d
    ];

    const letters = ["A", "B", "C", "D"];

    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach((btn, index) => {

        btn.textContent = `${letters[index]}. ${options[index]}`;

        btn.classList.remove("selected");

        if (selectedAnswers[question.id] === letters[index]) {
            btn.classList.add("selected");
        }

        btn.onclick = () => selectAnswer(question.id, letters[index]);

    });

    document.querySelector(".quiz-info p:first-child").textContent =
        `Question ${currentIndex + 1} of ${questions.length}`;

    document.querySelector(".progress").style.width =
        `${((currentIndex + 1) / questions.length) * 100}%`;

    updateButtons();

}
// ===== Select Answer =====
function selectAnswer(questionId, answer) {

    selectedAnswers[questionId] = answer;

    renderQuestion();

}

// ===== Previous =====
function previousQuestion() {

    if (currentIndex > 0) {

        currentIndex--;

        renderQuestion();

    }

}

// ===== Next =====
function nextQuestion() {

    if (currentIndex < questions.length - 1) {

        currentIndex++;

        renderQuestion();

    } else {

        submitQuiz();

    }

}

// ===== Update Buttons =====
function updateButtons() {

    const previousBtn = document.querySelector(".btn-secondary");
    const nextBtn = document.querySelector(".btn-primary");

    previousBtn.disabled = currentIndex === 0;

    if (currentIndex === questions.length - 1) {

        nextBtn.textContent = "Submit Quiz";

    } else {

        nextBtn.textContent = "Next Question";

    }

}

// ===== Timer =====
function startTimer() {

    clearInterval(timer);

    timer = setInterval(() => {

        timeLeft--;

        const mins = String(Math.floor(timeLeft / 60)).padStart(2, "0");
        const secs = String(timeLeft % 60).padStart(2, "0");

        document.querySelector(".quiz-info p:last-child").textContent =
            `Time Left: ${mins}:${secs}`;

        if (timeLeft <= 0) {

            clearInterval(timer);

            submitQuiz();

        }

    }, 1000);

}

// ===== Submit =====
async function submitQuiz() {

    clearInterval(timer);

    const answers = Object.entries(selectedAnswers).map(([id, answer]) => ({
        questionId: Number(id),
        selected: answer
    }));

    try {

        const response = await fetch(`${API_BASE}/api/results/submit`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                quizId: Number(quizId),

                answers

            })

        });

        const result = await response.json();

        if (!result.success) {

            alert(result.error || "Submission failed.");

            return;

        }

        localStorage.setItem(
            "quizResult",
            JSON.stringify(result.result)
        );

        window.location.href = "result.html";

    } catch (err) {

        console.error(err);

        alert("Failed to submit quiz.");

    }

}

// ===== Start =====
document.addEventListener("DOMContentLoaded", () => {

    loadQuestions();

    document
        .querySelector(".btn-secondary")
        .addEventListener("click", previousQuestion);

    document
        .querySelector(".btn-primary")
        .addEventListener("click", nextQuestion);

});

    </script>
</body>
</html>
