<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IntelliQuiz - Quiz Page</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Intelli.png">

</head>

<body>

    <div class="quiz-container">

        <div class="quiz-header">

            <h1>CSC 301 Quiz</h1>

            <div class="quiz-info">

                <p>Question 1 of 10</p>
                <p>Time Left: 09:45</p>

            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

        </div>

        <div class="question-box">

            <h2>
                What does DBMS stand for?
            </h2>

            <div class="options">

                <button class="option-btn">
                    Data Backup Management System
                </button>

                <button class="option-btn correct">
                    Database Management System
                </button>

                <button class="option-btn">
                    Digital Base Mapping System
                </button>

                <button class="option-btn">
                    Database Modelling Service
                </button>

            </div>

        </div>

        <div class="quiz-footer">

            <div class="score-area">
                Current Score: 8
            </div>

            <div class="quiz-buttons">

                <button class="btn-secondary">
                    Previous
                </button>

                <button class="btn-primary">
                    Next Question
                </button>

            </div>

        </div>

    </div>
 <footer class="footer">
        <p>© 2026 IntelliQuiz | Designed for Interactive Learning</p>
    </footer>
</body>
</html>
